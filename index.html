document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, mistake: 'Flaring elbows to 90° — keep them ~60° to protect the shoulders.' },\n      { name: 'Incline Dumbbell Press', scheme: '3 × 10', equipment: 'Dumbbells', rest: '90 s', cues: ['Bench at 30° — not steeper', 'Lower to nipple line with a slight elbow tuck', 'Squeeze at the top without clanking the bells'], mistake: 'Setting the bench too steep — that shifts the work to your shoulders.' },\n      { name: 'Cable Fly', scheme: '3 × 12', equipment: 'Cables', rest: '75 s', cues: ['Slight forward lean, soft elbows', 'Hug-a-tree arc, hands meet at the sternum', 'Control the stretch — 2 seconds back'], mistake: 'Turning it into a press by bending the elbows on the way in.' },\n      { name: 'Deficit Push-up', scheme: '3 × AMRAP', equipment: 'Bodyweight', rest: '60 s', cues: ['Hands on plates, chest below hand level', 'Rigid plank line from ear to ankle', 'Full lockout every rep'], mistake: 'Sagging hips — brace your core like a punch is coming.' }\n    ]},\n    { id: 'back', name: 'Back', duration: '~45 min', exercises: [\n      { name: 'Barbell Row', scheme: '4 × 8', equipment: 'Barbell', rest: '2 min', cues: ['Hinge to ~45° with a flat spine', 'Pull to the lower ribs, elbows tight', 'Pause one second at the top'], mistake: 'Standing up with the weight — the torso angle stays fixed.' },\n      { name: 'Pull-up', scheme: '4 × 6–8', equipment: 'Bodyweight', rest: '2 min', cues: ['Dead-hang start, shoulders pulled down', 'Lead with the chest, chin over the bar', 'Slow two-second descent'], mistake: 'Kipping for extra reps — quality over count.' },\n      { name: 'Lat Pulldown', scheme: '3 × 10', equipment: 'Cable', rest: '90 s', cues: ['Grip just outside the shoulders', 'Pull to the collarbone, elbows toward hips', 'Lean back no more than 15°'], mistake: 'Pulling behind the neck — always to the front.' },\n      { name: 'Face Pull', scheme: '3 × 15', equipment: 'Cable', rest: '60 s', cues: ['Rope set at eye height', 'Pull apart toward your ears', 'Thumbs point behind you at the end'], mistake: 'Going heavy — this is a rear-delt finisher; stay light.' }\n    ]},\n    { id: 'shoulders', name: 'Shoulders', duration: '~35 min', exercises: [\n      { name: 'Overhead Press', scheme: '4 × 6', equipment: 'Barbell', rest: '2 min', cues: ['Glutes and abs braced hard', 'Bar path straight — move your head, not the bar', 'Lock out with biceps by the ears'], mistake: 'Leaning back — that turns it into an incline press.' },\n      { name: 'Lateral Raise', scheme: '4 × 12', equipment: 'Dumbbells', rest: '60 s', cues: ['Slight elbow bend, lead with the elbows', 'Raise to shoulder height only', '\"Pour the jug\" wrist angle at the top'], mistake: 'Swinging with momentum — halve the weight if you must.' },\n      { name: 'Rear Delt Fly', scheme: '3 × 15', equipment: 'Dumbbells', rest: '60 s', cues: ['Hinge until your chest is parallel to the floor', 'Sweep the arms wide, pinkies up', 'No shrugging'], mistake: 'Squeezing the shoulder blades — keep them apart to isolate the delts.' },\n      { name: 'Barbell Shrug', scheme: '3 × 12', equipment: 'Barbell', rest: '75 s', cues: ['Straight up toward the ears', 'One-second squeeze at the top', 'No rolling the shoulders'], mistake: 'Rolling shoulders in circles — straight up and down only.' }\n    ]},\n    { id: 'arms', name: 'Arms', duration: '~35 min', exercises: [\n      { name: 'Barbell Curl', scheme: '4 × 10', equipment: 'Barbell', rest: '75 s', cues: ['Elbows pinned to the ribs', 'Curl to a full squeeze, two seconds down', 'Wrists neutral, not bent back'], mistake: 'Rocking the torso — stand against a wall to check yourself.' },\n      { name: 'Hammer Curl', scheme: '3 × 12', equipment: 'Dumbbells', rest: '60 s', cues: ['Palms face each other throughout', 'Cross-body variation hits the brachialis', 'Control the negative'], mistake: 'Letting the elbows drift forward at the top.' },\n      { name: 'Triceps Pushdown', scheme: '4 × 12', equipment: 'Cable', rest: '60 s', cues: ['Elbows glued to your sides', 'Full lockout with a one-second squeeze', 'Let the cable pull back to 90° — no higher'], mistake: 'Leaning over the cable and pressing with bodyweight.' },\n      { name: 'Skull Crusher', scheme: '3 × 10', equipment: 'EZ Bar', rest: '90 s', cues: ['Lower to the forehead or just behind it', 'Upper arms stay vertical', 'Elbows in — never flared'], mistake: 'Moving at the shoulder — only the elbow hinges.' }\n    ]},\n    { id: 'legs', name: 'Legs', duration: '~50 min', exercises: [\n      { name: 'Back Squat', scheme: '4 × 6', equipment: 'Barbell', rest: '3 min', cues: ['Big breath and brace before the descent', 'Knees track over the toes', 'Hip crease below the knee, drive through mid-foot'], mistake: 'Heels lifting — widen your stance or elevate the heels slightly.' },\n      { name: 'Romanian Deadlift', scheme: '4 × 8', equipment: 'Barbell', rest: '2 min', cues: ['Push the hips back with soft knees', 'Bar stays in contact with the legs', 'Stop at the hamstring stretch — not the floor'], mistake: 'Rounding the lower back — film a set from the side.' },\n      { name: 'Walking Lunge', scheme: '3 × 10 / leg', equipment: 'Dumbbells', rest: '90 s', cues: ['Long stride, torso tall', 'Back knee kisses the floor', 'Push through the front heel'], mistake: 'Short strides that stress the knee — step further out.' },\n      { name: 'Standing Calf Raise', scheme: '4 × 15', equipment: 'Machine', rest: '60 s', cues: ['Full stretch at the bottom with a pause', 'Rise to your absolute tiptoe', 'No bouncing'], mistake: 'Rushed partial reps — the stretch is where growth happens.' }\n    ]},\n    { id: 'core', name: 'Core', duration: '~25 min', exercises: [\n      { name: 'Hanging Leg Raise', scheme: '3 × 10', equipment: 'Pull-up bar', rest: '90 s', cues: ['Start from a dead hang, no swing', 'Curl the pelvis up — not just the legs', 'Lower under control'], mistake: 'Swinging for momentum — reset between reps if needed.' },\n      { name: 'Plank', scheme: '3 × 45–60 s', equipment: 'Bodyweight', rest: '60 s', cues: ['Straight line ear to ankle', 'Squeeze glutes and quads', 'Breathe — don\\u2019t hold your breath'], mistake: 'Hips sagging or piked — quality time beats long time.' },\n      { name: 'Cable Woodchop', scheme: '3 × 12 / side', equipment: 'Cable', rest: '60 s', cues: ['Rotate from the torso, arms stay long', 'Pivot the back foot', 'Slow return against the cable'], mistake: 'Pulling with the arms instead of rotating the trunk.' },\n      { name: 'Dead Bug', scheme: '3 × 10 / side', equipment: 'Bodyweight', rest: '45 s', cues: ['Lower back pressed into the floor', 'Opposite arm and leg extend together', 'Exhale as you extend'], mistake: 'Arching the lower back — shorten the range until it stays flat.' }\n    ]}\n  ];\n\n  scrollChat() {\n    requestAnimationFrame(() => {\n      const el = this.chatScrollRef.current;\n      if (el) el.scrollTop = el.scrollHeight;\n    });\n  }\n\n  async ask(text) {\n    const q = (text || '').trim();\n    if (!q || this.state.thinking) return;\n    const msgs = [...this.state.msgs, { role: 'user', text: q }];\n    this.setState({ msgs, chatInput: '', thinking: true });\n    this.scrollChat();\n    try {\n      const reply = await window.claude.complete({\n        system: \"You are the VORM coach — a world-class personal trainer and nutrition coach inside the VORM app. Be warm, direct, and practical. Answer form, programming, nutrition, recovery, and motivation questions like an expert trainer would: concrete cues, specific numbers when useful. Keep replies under 120 words, plain text (no markdown). If asked about pain or a medical issue, give sensible training modifications and recommend seeing a professional for diagnosis. Politely steer non-fitness topics back to training.\",\n        messages: msgs.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }))\n      });\n      this.setState({ msgs: [...msgs, { role: 'assistant', text: reply }], thinking: false });\n    } catch (e) {\n      this.setState({ msgs: [...msgs, { role: 'assistant', text: 'Hmm, I lost my connection for a second — try that again?' }], thinking: false });\n    }\n    this.scrollChat();\n  }\n\n  trainerVals() {\n    const active = this.CATS.find(c => c.id === this.state.cat) || this.CATS[0];\n    return {\n      catPills: this.CATS.map(c => {\n        const on = c.id === this.state.cat;\n        return {\n          name: c.name,\n          bg: on ? 'var(--accent)' : 'transparent',\n          color: on ? '#0d0d0f' : 'rgba(244,244,240,.75)',\n          border: on ? 'var(--accent)' : 'rgba(255,255,255,.18)',\n          onTap: () => this.setState({ cat: c.id, openEx: null })\n        };\n      }),\n      catTitle: active.name + ' session',\n      catMeta: active.exercises.length + ' exercises · ' + active.duration,\n      catExercises: active.exercises.map((ex, i) => {\n        const open = this.state.openEx === i;\n        return {\n          ...ex,\n          num: String(i + 1).padStart(2, '0'),\n          open,\n          chev: open ? '−' : '+',\n          cardBorder: open ? 'rgba(200,245,66,.35)' : 'rgba(255,255,255,.07)',\n          onTap: () => this.setState({ openEx: open ? null : i })\n        };\n      }),\n      suggestions: [\n        'My lower back hurts after deadlifts — what am I doing wrong?',\n        'What should I eat after an evening workout?',\n        'Build me a 3-day plan for a beginner'\n      ].map(t => ({ text: t, onTap: () => this.ask(t) })),\n      msgs: this.state.msgs.map(m => ({\n        text: m.text,\n        align: m.role === 'user' ? 'flex-end' : 'flex-start',\n        bg: m.role === 'user' ? 'var(--accent)' : '#1b1b20',\n        color: m.role === 'user' ? '#0d0d0f' : 'rgba(244,244,240,.88)'\n      })),\n      thinking: this.state.thinking,\n      chatInput: this.state.chatInput,\n      chatScrollRef: this.chatScrollRef,\n      onChatInput: (e) => this.setState({ chatInput: e.target.value }),\n      onChatKey: (e) => { if (e.key === 'Enter') wo questions about how you feel. Tomorrow\\u2019s plan is rebuilt overnight.' }\n      ],\n      planItems: [\n        'Adaptive daily workouts, gym or home',\n        'Personalized meal plans & macro tracking',\n        'Unlimited AI coach conversations',\n        '1,400+ exercise videos with form cues',\n        'Progress photos, PRs & weight trends',\n        'Recovery, stretching & sleep programming'\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
